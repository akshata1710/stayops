name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: stayops
          POSTGRES_PASSWORD: stayops
          POSTGRES_DB: stayops
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install aiosqlite email-validator pytest-cov

      - name: Run tests
        env:
          SECRET_KEY: test-secret-key-for-ci-only
          POSTGRES_HOST: localhost
          POSTGRES_PORT: 5432
          POSTGRES_USER: stayops
          POSTGRES_PASSWORD: stayops
          POSTGRES_DB: stayops
          REDIS_HOST: localhost
          REDIS_PORT: 6379
        run: |
          pytest -v --cov=app --cov-report=term-missing

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: .coverage
